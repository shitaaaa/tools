<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>內部工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f0ede8;
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 20px 80px;
  }

  .container {
    width: 100%;
    max-width: 600px;
  }

  /* header */
  .header {
    margin-bottom: 32px;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 15px;
    color: #999;
  }

  /* tool card */
  .tool-card {
    background: #fff;
    border-radius: 16px;
    padding: 22px 24px;
    margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    gap: 18px;
    text-decoration: none;
    color: inherit;
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }
  .tool-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  }
  .tool-card:active { transform: scale(0.99); }

  .tool-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    background: #eef0fb;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .tool-info { flex: 1; }
  .tool-name {
    font-size: 17px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 4px;
  }
  .tool-desc {
    font-size: 14px;
    color: #999;
    line-height: 1.5;
  }

  .tool-arrow {
    font-size: 18px;
    color: #ccc;
    flex-shrink: 0;
  }

  /* coming soon */
  .tool-card.soon {
    opacity: 0.5;
    cursor: default;
    pointer-events: none;
  }
  .soon-badge {
    font-size: 11px;
    font-weight: 500;
    color: #aaa;
    background: #f0ede8;
    border-radius: 999px;
    padding: 3px 10px;
    flex-shrink: 0;
  }

  /* section label */
  .section-label {
    font-size: 12px;
    font-weight: 500;
    color: #bbb;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 28px 0 12px;
  }

  /* animations */
  @keyframes up {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .header      { animation: up 0.3s ease both; }
  .tool-card   { animation: up 0.3s ease both; }
  .tool-card:nth-child(1) { animation-delay: 0.05s; }
  .tool-card:nth-child(2) { animation-delay: 0.1s; }
  .tool-card:nth-child(3) { animation-delay: 0.15s; }

  .footer {
    margin-top: 40px;
    text-align: center;
    font-size: 12px;
    color: #ccc;
  }

  @media (max-width: 480px) {
    body { padding: 28px 14px 60px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>內部工具</h1>
    <p class="subtitle">公司內部常用小工具 · 點擊直接使用</p>
  </div>

  <div class="section-label">現有工具</div>

  <a class="tool-card" href="changepath.html">
    <div class="tool-icon">⇄</div>
    <div class="tool-info">
      <div class="tool-name">NAS 路徑轉換</div>
      <div class="tool-desc">Mac ↔ PC 路徑格式互換，貼上即可轉換</div>
    </div>
    <div class="tool-arrow">›</div>
  </a>

  <div class="section-label">即將推出</div>

  <div class="tool-card soon">
    <div class="tool-icon" style="background:#f5f4f0;">＋</div>
    <div class="tool-info">
      <div class="tool-name">更多工具</div>
      <div class="tool-desc">陸續新增中...</div>
    </div>
    <div class="soon-badge">即將推出</div>
  </div>

  <div class="footer">Internal Use Only</div>

</div>
</body>
</html>

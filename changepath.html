<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>路徑轉換工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f0ede8;
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  .container {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .back-link {
    align-self: center;
    font-size: 14px;
    color: #bbb;
    text-decoration: none;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color 0.15s;
  }
  .back-link:hover { color: #888; }

  .header { text-align: center; margin-bottom: 28px; }
  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .subtitle { font-size: 15px; color: #999; }

  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 32px 28px 36px;
    width: 100%;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
  }

  .section { margin-bottom: 24px; }
  .section-label {
    font-size: 15px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 12px;
  }

  .tags { display: flex; flex-wrap: wrap; gap: 10px; }
  .tag {
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .tag-mode { background: #eef0fb; color: #5a65c8; }
  .tag-mode:hover { background: #e0e3f7; }
  .tag-mode.active { background: #4c57bf; color: #fff; }

  textarea {
    width: 100%;
    background: #f7f6f4;
    border: 2px solid #e8e5e0;
    border-radius: 14px;
    padding: 16px 18px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: #1a1a1a;
    resize: vertical;
    min-height: 90px;
    line-height: 1.8;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  textarea:focus {
    border-color: #4c57bf;
    box-shadow: 0 0 0 4px rgba(76,87,191,0.1);
    background: #fff;
  }
  textarea::placeholder { color: #c0bdb8; }

  .result-label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  /* 結果框本身可選取，方便手動複製 */
  .result-box {
    width: 100%;
    background: #f7f6f4;
    border: 2px solid #e8e5e0;
    border-radius: 14px;
    padding: 16px 18px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    min-height: 90px;
    word-break: break-all;
    white-space: pre-wrap;
    line-height: 1.8;
    color: #c0bdb8;
    transition: all 0.2s;
    user-select: text;
    cursor: text;
  }
  .result-box.has-result {
    color: #1a7a45;
    background: #f0faf5;
    border-color: #a8d9bc;
  }
  .result-box.error {
    color: #b94040;
    background: #fdf3f3;
    border-color: #e8b4b4;
  }

  .copy-btn {
    background: #fff;
    border: 1.5px solid #e0ddd8;
    border-radius: 8px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 500;
    color: #888;
    cursor: pointer;
    transition: all 0.14s;
    font-family: 'Noto Sans TC', sans-serif;
    flex-shrink: 0;
  }
  .copy-btn:hover:not(:disabled) { border-color: #bbb; color: #444; background: #f7f6f4; }
  .copy-btn.ok { border-color: #a8d9bc; color: #1a7a45; background: #f0faf5; }
  .copy-btn:disabled { opacity: 0.3; cursor: default; }

  .arrow-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 18px 0;
  }
  .arrow-line { flex: 1; height: 1.5px; background: #ece9e4; }
  .arrow-label {
    font-size: 13px;
    color: #bbb;
    font-weight: 500;
    white-space: nowrap;
  }

  .generate-btn {
    width: 100%;
    background: #4c57bf;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 18px;
    font-size: 18px;
    font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 8px;
    transition: opacity 0.15s, transform 0.12s;
  }
  .generate-btn:hover { opacity: 0.88; }
  .generate-btn:active { transform: scale(0.98); }

  @keyframes up {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .back-link { animation: up 0.25s ease both; }
  .header    { animation: up 0.3s 0.05s ease both; }
  .card      { animation: up 0.3s 0.1s ease both; }

  @media (max-width: 480px) {
    body { padding: 28px 14px 60px; }
    h1 { font-size: 24px; }
    .card { padding: 24px 18px 28px; }
  }
</style>
</head>
<body>
<div class="container">

  <a class="back-link" href="https://shitaaaa.github.io/tools/">
    ← 🍎 西達小天地
  </a>

  <div class="header">
    <h1>路徑轉換工具</h1>
    <p class="subtitle">Mac ↔ PC · NAS 路徑一鍵互換</p>
  </div>

  <div class="card">

    <div class="section">
      <div class="section-label">轉換方向（單選）</div>
      <div class="tags">
        <span class="tag tag-mode active" data-mode="mac2pc" onclick="selectMode(this)">🍎 Mac → PC</span>
        <span class="tag tag-mode" data-mode="pc2mac" onclick="selectMode(this)">🪟 PC → Mac</span>
      </div>
    </div>

    <div class="section">
      <div class="section-label" id="input-label">貼上 Mac 路徑</div>
      <textarea id="input-path"
        placeholder="大雲/_03美編部/... 或 /Volumes/大雲/_03美編部/..."
        oninput="convert()" spellcheck="false"></textarea>
    </div>

    <div class="arrow-row">
      <div class="arrow-line"></div>
      <div class="arrow-label"><span id="arrow-text">轉換為 PC 路徑</span> ↓</div>
      <div class="arrow-line"></div>
    </div>

    <div class="section">
      <div class="result-label-row">
        <div class="section-label" id="output-label" style="margin:0">PC 路徑結果</div>
        <button class="copy-btn" id="copy-btn" onclick="copyResult()" disabled>複製</button>
      </div>
      <div class="result-box" id="output-path">等待輸入路徑...</div>
    </div>

    <button class="generate-btn" onclick="convert()">⇄ 立即轉換</button>

  </div>
</div>

<script>
  const MAPPINGS = [
    { mac: '素材庫',           pc: 'M:' },
    { mac: '廠商新品照片與資料', pc: 'P:' },
    { mac: '大雲',             pc: 'S:' },
    { mac: '部門專用資料夾',    pc: 'U:' },
    { mac: 'scan',            pc: 'X:' },
  ];

  let mode = 'mac2pc';
  let currentResult = '';

  function selectMode(el) {
    document.querySelectorAll('.tag-mode').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    mode = el.dataset.mode;
    document.getElementById('input-label').textContent  = mode === 'mac2pc' ? '貼上 Mac 路徑' : '貼上 PC 路徑';
    document.getElementById('output-label').textContent = mode === 'mac2pc' ? 'PC 路徑結果'   : 'Mac 路徑結果';
    document.getElementById('arrow-text').textContent   = mode === 'mac2pc' ? '轉換為 PC 路徑' : '轉換為 Mac 路徑';
    document.getElementById('input-path').placeholder  = mode === 'mac2pc'
      ? '大雲/_03美編部/... 或 /Volumes/大雲/_03美編部/...'
      : 'S:\\_03美編部\\...';
    document.getElementById('input-path').value = '';
    setOutput('', 'empty');
  }

  function setOutput(text, state) {
    const el  = document.getElementById('output-path');
    const btn = document.getElementById('copy-btn');
    el.classList.remove('has-result', 'error');
    currentResult = '';

    if (!text) {
      el.textContent = '等待輸入路徑...';
      btn.disabled = true;
    } else {
      el.textContent = text;
      if (state === 'ok') {
        el.classList.add('has-result');
        btn.disabled = false;
        currentResult = text;
      } else if (state === 'error') {
        el.classList.add('error');
        btn.disabled = true;
      }
    }
  }

  function stripMacPrefix(raw) {
    for (const m of MAPPINGS) {
      const withVol    = '/Volumes/' + m.mac;
      const withoutVol = m.mac;

      if (raw.startsWith(withVol + '/')) {
        return { matched: m, body: raw.slice((withVol + '/').length) };
      }
      if (raw.startsWith(withVol)) {
        let body = raw.slice(withVol.length);
        if (body.startsWith('/')) body = body.slice(1);
        return { matched: m, body };
      }
      if (raw.startsWith(withoutVol + '/')) {
        return { matched: m, body: raw.slice((withoutVol + '/').length) };
      }
      if (raw.startsWith(withoutVol)) {
        let body = raw.slice(withoutVol.length);
        if (body.startsWith('/')) body = body.slice(1);
        return { matched: m, body };
      }
    }
    return null;
  }

  function stripPcPrefix(raw) {
    const rawN = raw.replace(/\\/g, '/');
    for (const m of MAPPINGS) {
      const pcN = m.pc;
      if (rawN.startsWith(pcN + '/')) {
        return { matched: m, body: rawN.slice((pcN + '/').length) };
      }
      if (rawN.startsWith(pcN)) {
        let body = rawN.slice(pcN.length);
        if (body.startsWith('/')) body = body.slice(1);
        return { matched: m, body };
      }
    }
    return null;
  }

  function convert() {
    const raw = document.getElementById('input-path').value.trim();
    if (!raw) { setOutput('', 'empty'); return; }

    if (mode === 'mac2pc') {
      const found = stripMacPrefix(raw);
      if (!found) { setOutput('⚠ 找不到對應磁碟，請確認路徑開頭是否正確', 'error'); return; }
      setOutput(found.matched.pc + '\\' + found.body.replace(/\//g, '\\'), 'ok');
    } else {
      const found = stripPcPrefix(raw);
      if (!found) { setOutput('⚠ 找不到對應磁碟，請確認路徑開頭是否正確', 'error'); return; }
      setOutput(found.matched.mac + (found.body ? '/' + found.body.replace(/\\/g, '/') : ''), 'ok');
    }
  }

  function copyResult() {
    if (!currentResult) return;

    // 方法一：現代 clipboard API
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(currentResult)
        .then(() => showCopied())
        .catch(() => fallbackCopy(currentResult));
    } else {
      // 方法二：建立隱藏 textarea 選取後執行 copy 指令
      fallbackCopy(currentResult);
    }
  }

  function fallbackCopy(text) {
    const tmp = document.createElement('textarea');
    tmp.value = text;
    tmp.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
    document.body.appendChild(tmp);
    tmp.focus();
    tmp.select();
    try {
      document.execCommand('copy');
      showCopied();
    } catch(e) {
      alert('自動複製失敗，請手動選取結果框的文字後複製');
    }
    document.body.removeChild(tmp);
  }

  function showCopied() {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '已複製 ✓';
    btn.classList.add('ok');
    setTimeout(() => {
      btn.textContent = '複製';
      btn.classList.remove('ok');
    }, 1800);
  }
</script>
</body>
</html>

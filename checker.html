<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上架素材規範檢查工具</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange:      #FF9F1C;
    --orange-lt:   #FFBF69;
    --teal:        #119DA4;
    --teal-dk:     #0C7489;
    --white:       #FFFFFF;
    --bg:          #F7F8FA;
    --surface:     #FFFFFF;
    --surface2:    #F0F2F5;
    --border:      #E2E6ED;
    --text:        #1A2030;
    --text-muted:  #7A8599;
    --text-dim:    #4A5568;
    --green:       #16A34A;
    --green-bg:    #F0FDF4;
    --green-bd:    #BBF7D0;
    --red:         #DC2626;
    --red-bg:      #FEF2F2;
    --red-bd:      #FECACA;
    --amber:       #D97706;
    --amber-bg:    #FFFBEB;
    --amber-bd:    #FDE68A;
    --info:        #0891B2;
    --info-bg:     #F0FDFE;
    --info-bd:     #A5F3FC;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
    min-height: 100vh;
    padding: 28px 16px 80px;
    font-size: 14px;
    line-height: 1.6;
  }

  .app { max-width: 980px; margin: 0 auto; }

  /* ── Header ── */
  .header {
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--orange), var(--orange-lt));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(255,159,28,0.3);
  }
  .header h1 {
    font-size: 20px; font-weight: 700;
    letter-spacing: -0.3px; color: var(--text);
  }
  .header p { color: var(--text-muted); margin-top: 2px; font-size: 13px; }

  /* ── Drop zone ── */
  #dropZone {
    border: 2px dashed var(--orange-lt);
    border-radius: 14px;
    padding: 52px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    background: var(--surface);
    position: relative;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  #dropZone:hover, #dropZone.drag-over {
    border-color: var(--orange);
    background: #FFFBF4;
    box-shadow: 0 4px 16px rgba(255,159,28,0.12);
  }
  #dropZone input[type="file"] {
    position: absolute; inset: 0; opacity: 0;
    cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon { font-size: 40px; margin-bottom: 12px; display: block; }
  .drop-title {
    font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px;
  }
  .drop-sub { color: var(--text-muted); font-size: 13px; }
  .drop-hint {
    margin-top: 18px; display: flex;
    justify-content: center; gap: 10px; flex-wrap: wrap;
  }
  .drop-hint span {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 12px; border-radius: 20px;
    font-size: 12px; color: var(--text-dim);
  }

  /* ── Progress ── */
  #progressArea { display: none; margin-top: 20px; }
  .progress-bar-wrap {
    background: var(--surface2); border-radius: 6px;
    height: 5px; overflow: hidden; margin-top: 8px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--orange), var(--orange-lt));
    border-radius: 6px; transition: width 0.3s; width: 0%;
  }
  .progress-label {
    color: var(--text-muted); font-size: 13px;
    display: flex; justify-content: space-between;
  }

  /* ── Summary ── */
  #summary {
    display: none; margin-top: 20px;
    padding: 16px 20px;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .summary-stats { display: flex; gap: 24px; flex-wrap: wrap; }
  .stat { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .stat-num { font-size: 22px; font-weight: 700; }
  .stat-num.blue  { color: var(--teal); }
  .stat-num.green { color: var(--green); }
  .stat-num.red   { color: var(--red); }
  .btn-reset {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 8px 18px; border-radius: 8px;
    cursor: pointer; font-size: 13px; transition: background 0.15s;
    white-space: nowrap; font-weight: 500;
  }
  .btn-reset:hover { background: var(--border); }

  /* ── Results ── */
  #results { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }

  /* ── Product card ── */
  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .product-header {
    padding: 14px 18px;
    display: flex; align-items: center;
    justify-content: space-between;
    cursor: pointer; user-select: none; gap: 12px;
    border-left: 4px solid var(--orange-lt);
    transition: background 0.15s;
  }
  .product-header:hover { background: var(--surface2); }
  .product-card.open .product-header { border-left-color: var(--orange); }
  .product-name {
    font-weight: 600; font-size: 14px;
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .product-meta {
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .badge {
    padding: 3px 11px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
  }
  .badge-pass { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
  .badge-fail { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-bd); }
  .badge-warn { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-bd); }
  .chevron { color: var(--text-muted); transition: transform 0.2s; font-size: 11px; }
  .product-card.open .chevron { transform: rotate(90deg); }

  /* ── Category list ── */
  .category-list { display: none; border-top: 1px solid var(--border); }
  .product-card.open .category-list { display: block; }

  .category-row {
    padding: 12px 18px 12px 22px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 12px;
  }
  .category-row:last-child { border-bottom: none; }
  .cat-icon { font-size: 15px; flex-shrink: 0; margin-top: 2px; }
  .cat-body { flex: 1; min-width: 0; }
  .cat-title {
    font-weight: 600; font-size: 13px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .cat-spec {
    font-size: 11.5px; color: var(--text-muted);
    margin-top: 2px; line-height: 1.5;
  }

  .cat-label-tag {
    font-size: 11px; padding: 1px 8px;
    border-radius: 10px; font-weight: 500;
  }
  .tag-required    { background: #EFF6FF; color: var(--teal-dk); border: 1px solid #BAE6FD; }
  .tag-optional    { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
  .tag-conditional { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-bd); }

  .cat-errors { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
  .error-item {
    font-size: 12px; color: var(--red);
    display: flex; align-items: flex-start; gap: 5px;
    padding: 4px 8px; background: var(--red-bg);
    border-radius: 5px; border-left: 3px solid var(--red);
  }
  .error-item::before { content: '&#x2715;'; flex-shrink: 0; }
  .warn-item {
    font-size: 12px; color: var(--amber);
    display: flex; align-items: flex-start; gap: 5px;
  }
  .warn-item::before { content: '•'; flex-shrink: 0; }
  .info-item {
    font-size: 12px; color: var(--info);
    display: flex; align-items: flex-start; gap: 5px;
    padding: 4px 8px; background: var(--info-bg);
    border-radius: 5px; border-left: 3px solid var(--info-bd);
  }
  .info-item::before { content: '&#x2139;'; flex-shrink: 0; }

  .file-list { margin-top: 8px; display: flex; flex-direction: column; gap: 5px; }
  .file-entry {
    background: var(--surface2); border-radius: 6px;
    padding: 7px 10px; font-size: 12px;
    border: 1px solid var(--border);
  }
  .file-entry-name {
    color: var(--text-dim); font-family: 'SF Mono', 'Fira Code', monospace;
    word-break: break-all; margin-bottom: 3px;
  }
  .file-entry-meta { color: var(--text-muted); font-size: 11px; margin-bottom: 3px; }
  .file-entry-errors { display: flex; flex-direction: column; gap: 3px; margin-top: 3px; }

  .pass-msg { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  /* ── Status column ── */
  .cat-status {
    flex-shrink: 0; text-align: right;
    font-size: 12px; margin-top: 2px; font-weight: 500;
  }
  .status-pass    { color: var(--green); }
  .status-fail    { color: var(--red); }
  .status-warn    { color: var(--amber); }
  .status-missing { color: var(--red); }
  .status-skip    { color: var(--text-muted); }

  .empty-msg {
    text-align: center; color: var(--text-muted);
    padding: 40px; font-size: 14px;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex; gap: 0; margin-bottom: 24px;
    border-bottom: 2px solid var(--border);
  }
  .tab-btn {
    padding: 10px 22px; font-size: 14px; font-weight: 600;
    border: none; background: none; cursor: pointer;
    color: var(--text-muted); border-bottom: 2px solid transparent;
    margin-bottom: -2px; transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); }
  #tab-custom-btn.active, .tab-btn.tab-blue.active { color: #2563EB; border-bottom-color: #2563EB; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Custom spec checker ── */
  .custom-layout {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 20px; align-items: start;
  }
  @media (max-width: 680px) { .custom-layout { grid-template-columns: 1fr; } }

  .spec-panel {
    background: #fff; border: 1px solid #DBEAFE;
    border-radius: 12px; padding: 18px;
    box-shadow: 0 1px 4px rgba(59,130,246,0.08);
  }
  .spec-panel h3 {
    font-size: 13px; font-weight: 700; color: #1E40AF;
    margin-bottom: 10px; display: flex; align-items: center; gap: 7px;
  }
  .spec-textarea {
    width: 100%; min-height: 180px;
    border: 1px solid #BFDBFE; border-radius: 8px;
    padding: 10px 12px; font-size: 13px;
    font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', monospace;
    resize: vertical; color: var(--text); background: #F8FAFF;
    line-height: 1.6; outline: none;
    transition: border-color 0.15s;
  }
  .spec-textarea:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
  .spec-textarea::placeholder { color: #93C5FD; }

  .spec-parse-btn {
    margin-top: 10px; width: 100%;
    background: #2563EB; color: white;
    border: none; border-radius: 8px;
    padding: 9px 0; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .spec-parse-btn:hover { background: #1D4ED8; }

  .parsed-rules {
    margin-top: 14px; display: flex; flex-direction: column; gap: 6px;
  }
  .rule-chip {
    background: #EFF6FF; border: 1px solid #BFDBFE;
    border-radius: 8px; padding: 8px 12px;
    font-size: 12px; color: #1E40AF;
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  .rule-chip-name { font-weight: 600; color: #1D4ED8; flex: 1; min-width: 0; }
  .rule-chip-spec { color: #60A5FA; font-size: 11px; text-align: right; }
  .rule-chip-del {
    color: #93C5FD; cursor: pointer; font-size: 14px;
    flex-shrink: 0; padding: 0 2px;
  }
  .rule-chip-del:hover { color: var(--red); }
  .rule-hint { font-size: 12px; color: #60A5FA; margin-top: 8px; line-height: 1.7; }

  /* Custom drop zone */
  #customDropZone {
    border: 2px dashed #BFDBFE; border-radius: 12px;
    padding: 40px 20px; text-align: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: #fff; position: relative;
    box-shadow: 0 1px 4px rgba(59,130,246,0.08);
  }
  #customDropZone:hover, #customDropZone.drag-over {
    border-color: #3B82F6; background: #EFF6FF;
  }
  #customDropZone input[type="file"] {
    position: absolute; inset: 0; opacity: 0;
    cursor: pointer; width: 100%; height: 100%;
  }
  #customDropZone.has-rules { border-color: #2563EB; }
  #customDropZone .drop-title { color: #1E40AF; }
  #customDropZone .drop-sub { color: #93C5FD; }

  /* Custom results */
  #customResults { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  .custom-file-row {
    background: #fff; border: 1px solid #DBEAFE;
    border-radius: 10px; padding: 12px 16px;
    display: flex; align-items: flex-start; gap: 12px;
    box-shadow: 0 1px 3px rgba(59,130,246,0.06);
  }
  .custom-file-row.row-pass { border-left: 4px solid var(--green); }
  .custom-file-row.row-fail { border-left: 4px solid var(--red); }
  .custom-file-row.row-nomatch { border-left: 4px solid #BFDBFE; }
  .custom-file-info { flex: 1; min-width: 0; }
  .custom-file-name {
    font-size: 13px; font-weight: 600; color: #1E40AF;
    font-family: 'SF Mono', 'Fira Code', monospace;
    word-break: break-all; margin-bottom: 3px;
  }
  .custom-file-meta { font-size: 12px; color: #60A5FA; margin-bottom: 6px; }
  .custom-rule-match {
    font-size: 12px; font-weight: 500; margin-bottom: 4px; color: #2563EB;
  }
  .custom-badge {
    flex-shrink: 0; font-size: 12px; font-weight: 600;
    padding: 3px 10px; border-radius: 20px;
  }
  .cb-pass { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
  .cb-fail { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-bd); }
  .cb-nomatch { background: #EFF6FF; color: #93C5FD; border: 1px solid #BFDBFE; }

  .custom-summary-bar {
    background: #EFF6FF; border: 1px solid #BFDBFE;
    border-radius: 10px; padding: 14px 18px;
    display: flex; gap: 20px; flex-wrap: wrap; align-items: center;
    margin-bottom: 4px;
  }
  .custom-summary-bar .stat-num { color: #2563EB; }
  .custom-clear-btn {
    margin-left: auto; background: #fff;
    border: 1px solid #BFDBFE; color: #2563EB;
    padding: 6px 14px; border-radius: 7px; cursor: pointer;
    font-size: 12px; font-weight: 500;
  }
  .custom-clear-btn:hover { background: #DBEAFE; }

  /* 放大錯誤項目 */
  .custom-errors-wrap {
    margin-top: 8px; display: flex; flex-direction: column; gap: 6px;
  }
  .custom-error-item {
    display: flex; align-items: flex-start; gap: 8px;
    background: #FEF2F2; border: 1px solid #FECACA;
    border-left: 4px solid #DC2626;
    border-radius: 7px; padding: 8px 12px;
  }
  .custom-error-icon {
    color: #DC2626; font-size: 15px; font-weight: 700;
    flex-shrink: 0; margin-top: 1px;
  }
  .custom-error-text {
    color: #991B1B; font-size: 14px; font-weight: 600; line-height: 1.5;
  }
  .name-fail {
    color: #DC2626 !important;
  }

  /* 張數警告 */
  .custom-file-row.row-count-warn { border-left: 4px solid #D97706; }
  .cb-count-warn { background: #FEF3C7; color: #92400E; border: 1px solid #FDE68A; }

  .count-inline-warning {
    margin-top: 6px;
    background: #FEF3C7; border: 1px solid #FDE68A;
    border-left: 3px solid #D97706;
    border-radius: 6px; padding: 7px 12px;
    font-size: 13px; font-weight: 600; color: #92400E;
  }
  .count-inline-warning strong { font-size: 15px; color: #B45309; }
    background: #FEF3C7; border: 1px solid #FDE68A;
    border-left: 4px solid #D97706;
    border-radius: 8px; padding: 10px 14px;
    font-size: 13px; color: #92400E; font-weight: 500;
    margin-bottom: 6px;
  }

  /* 待檢核區 */
  .pending-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; flex-wrap: wrap; gap: 8px;
  }
  .pending-count {
    font-size: 13px; font-weight: 700; color: #2563EB;
  }
  .pending-clear-btn {
    background: #fff; border: 1px solid #BFDBFE; color: #60A5FA;
    padding: 6px 12px; border-radius: 7px; cursor: pointer;
    font-size: 12px; font-weight: 500;
  }
  .pending-clear-btn:hover { background: #EFF6FF; }
  .pending-confirm-btn {
    background: #2563EB; color: #fff; border: none;
    padding: 6px 16px; border-radius: 7px; cursor: pointer;
    font-size: 13px; font-weight: 700;
    box-shadow: 0 2px 6px rgba(37,99,235,0.25);
    transition: background 0.15s;
  }
  .pending-confirm-btn:hover { background: #1D4ED8; }
  .pending-list {
    display: flex; flex-direction: column; gap: 4px;
    max-height: 220px; overflow-y: auto;
    border: 1px solid #DBEAFE; border-radius: 8px;
    padding: 8px; background: #F8FAFF;
  }
  .pending-item {
    font-size: 12px; color: #1E40AF;
    font-family: 'SF Mono', 'Fira Code', monospace;
    padding: 4px 8px; border-radius: 5px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; background: #EFF6FF;
  }
  .pending-item-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pending-item-size { color: #60A5FA; flex-shrink: 0; font-size: 11px; }
  .pending-item-del { color: #93C5FD; cursor: pointer; flex-shrink: 0; }
  .pending-item-del:hover { color: #DC2626; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-icon">&#x1F4CB;</div>
    <div>
      <h1>上架素材規範檢查工具</h1>
      <p>上傳品項資料夾，自動檢查主圖、情境圖、去背、內文圖等素材是否符合上架規範</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('tab-listing')">&#x1F4CB; 新品上架規範</button>
    <button id="tab-custom-btn" class="tab-btn tab-blue" onclick="switchTab('tab-custom')">&#x1F50D; 自訂規格檢查</button>
  </div>

  <div id="tab-listing" class="tab-panel active">

    <div id="dropZone">
      <input type="file" id="fileInput" webkitdirectory multiple accept="image/*,.psd,.psb">
      <span class="drop-icon">&#x1F4C1;</span>
      <div class="drop-title">拖曳資料夾到此處，或點擊選擇</div>
      <div class="drop-sub">支援一次拖入多個品項資料夾，或整個品項集合資料夾</div>
      <div class="drop-hint">
        <span>✅ 主圖</span>
        <span>✅ 情境圖</span>
        <span>✅ 去背PNG/JPG</span>
        <span>✅ 內文圖</span>
        <span>⚙️ 正方形內文圖</span>
        <span>📂 支援多品項同時拖入</span>
      </div>
    </div>

    <div id="progressArea">
      <div class="progress-label">
        <span id="progressText">分析中…</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <div id="summary">
      <div class="summary-stats">
        <div class="stat"><span class="stat-num blue" id="totalCount">0</span><span>個品項</span></div>
        <div class="stat"><span class="stat-num green" id="passCount">0</span><span>全部通過</span></div>
        <div class="stat"><span class="stat-num red" id="failCount">0</span><span>有問題</span></div>
      </div>
      <button class="btn-reset" onclick="resetApp()">&#x21A9; 重新上傳</button>
    </div>

    <div id="results"></div>

  </div><!-- /tab-listing -->

<!-- ── Tab 2: 自訂規格檢查 ── -->
<div id="tab-custom" class="tab-panel">
  <div class="custom-layout">

    <!-- 左：貼上規格 -->
    <div class="spec-panel">
      <h3>&#x1F4DD; 貼上規格文字</h3>
      <textarea id="specInput" class="spec-textarea"
        placeholder="支援純文字或複製自 Excel 的表格文字，例如：

首圖 800×800 50~400KB 5張
橫幅 1920×600 100~500KB x3
說明圖 1000×1200 200KB以內 X6

張數格式：5張 / x5 / X5（上傳後會比對實際數量）
KB 格式：50~400KB / 200KB以內 / 2MB以內
檔名需含尺寸：1080x500 / 1080X500 / 1080_500（可加px）"></textarea>
      <button class="spec-parse-btn" onclick="parseSpecInput()">解析規格 &#x2192;</button>
      <div id="parsedRules" class="parsed-rules"></div>
      <div class="rule-hint" id="ruleHint" style="display:none">
        解析完成後，拖曳圖片到右側進行檢查。<br>
        檔名若包含規格名稱關鍵字會自動配對，否則逐一比對所有規格。
      </div>
    </div>

    <!-- 右：拖曳上傳 -->
    <div>
      <div id="customDropZone">
        <input type="file" id="customFileInput" multiple accept="image/*">
        <span class="drop-icon">&#x1F5BC;</span>
        <div class="drop-title">拖曳圖片到此處，或點擊選擇</div>
        <div class="drop-sub">可分多次加入，加完再按「確認檢核」</div>
      </div>

      <!-- 待檢核清單 -->
      <div id="pendingArea" style="display:none; margin-top:12px;">
        <div class="pending-header">
          <span id="pendingCount" class="pending-count">0 張待檢核</span>
          <div style="display:flex;gap:8px;">
            <button class="pending-clear-btn" onclick="clearPending()">清除全部</button>
            <button class="pending-confirm-btn" onclick="confirmCheck()">確認檢核 &#x2192;</button>
          </div>
        </div>
        <div id="pendingList" class="pending-list"></div>
      </div>

      <div id="customResults"></div>
    </div>

  </div>
</div><!-- /tab-custom -->

</div><!-- /app -->

<script>
// ─── Skip patterns ────────────────────────────────────────────────
const SKIP_NAMES = /^(\.DS_Store|Thumbs\.db|desktop\.ini|\._.*)$/i;
const SKIP_EXTS  = /\.(psd|psb|ai|eps|indd|xd|sketch|fig|tif|tiff|bmp|webp|svg|pdf|xlsx?|docx?|zip|rar|7z)$/i;
const SKIP_DIRS  = /^(source|sorce|src|素材|\.git|__MACOSX)$/i;
const IMAGE_EXTS = /\.(jpe?g|png)$/i;

function hasChinese(s) {
  return /[一-鿿㐀-䶿豈-﫿⺀-⻿]/.test(s);
}
function bytesToKB(b) { return b / 1000; }
function fmt(kb) { return kb < 1024 ? kb.toFixed(1) + ' KB' : (kb/1024).toFixed(2) + ' MB'; }
function fmtBytes(b) { return fmt(bytesToKB(b)); }

// ─── Get image dimensions ─────────────────────────────────────────
function getImageDimensions(file) {
  return new Promise((resolve) => {
    // Try FileReader (base64) first — works in sandboxed iframes
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => resolve({ w: img.naturalWidth, h: img.naturalHeight });
      img.onerror = () => resolve({ w: 0, h: 0 });
      img.src = e.target.result;
    };
    reader.onerror = () => resolve({ w: 0, h: 0 });
    reader.readAsDataURL(file);
  });
}

// ─── Parse folder structure ───────────────────────────────────────
function parseFiles(fileList) {
  // Build: { productKey: { productName, categories: { ... } } }
  const products = {};

  const addFile = (productKey, productName, category, file, basename) => {
    if (!products[productKey]) {
      products[productKey] = {
        name: productName,
        categories: {
          main600: [], main1000: [], mainUnknown: [],
          situation: [], removeBackground: [],
          images: [], all: [], all960: [],
          images1000: [], other: [], rootUnknown: [], unknown: []
        }
      };
    }
    products[productKey].categories[category].push({ file, basename });
  };

  for (const file of fileList) {
    const path = file.webkitRelativePath || file.name;
    const parts = path.split('/');
    const basename = parts[parts.length - 1];

    // Skip unwanted files
    if (SKIP_NAMES.test(basename)) continue;
    if (SKIP_EXTS.test(basename)) continue;
    if (!IMAGE_EXTS.test(basename)) continue;

    // Skip source/sorce directories anywhere in path
    const isInSkipDir = parts.slice(0, -1).some(p => SKIP_DIRS.test(p));
    if (isInSkipDir) continue;

    // Determine folder depth
    // parts[0] = root (either collection or product)
    // If depth >= 3 and parts[1] looks like a product (has main/, images/ etc) use that
    // We try to detect: is parts[0] a collection folder?
    // Strategy: if parts.length === 2, parts[0] is the product
    // if parts.length >= 3, parts[0] is collection, parts[1] is product
    // We'll group by detecting the level where known subfolders appear

    let productIdx, subpathParts;

    if (parts.length === 2) {
      // file directly in root: root/filename &#x2192; treat root as product
      productIdx = 0;
      subpathParts = parts.slice(1);
    } else {
      // Heuristic: if parts[1] is a known subfolder name, parts[0] is the product
      const knownSubfolders = /^(main|images|images-1000)$/i;
      if (knownSubfolders.test(parts[1])) {
        productIdx = 0;
        subpathParts = parts.slice(1);
      } else {
        // parts[0] = collection, parts[1] = product
        productIdx = 1;
        subpathParts = parts.slice(2);
      }
    }

    const productName = parts[productIdx];
    const productKey = parts.slice(0, productIdx + 1).join('/');
    const subpath = subpathParts.join('/');

    // Categorize
    let category = 'unknown';

    if (subpathParts.length === 1) {
      // Root-level file in product folder
      // 支援單張時用 品號-960all 或 品號-960all_01 兩種命名
      if (/-960all(_\d+)?\./i.test(basename)) category = 'all960';
      // 支援單張時用 品號-all 或 品號-all_01 兩種命名（但排除 960all）
      else if (/-all(_\d+)?\./i.test(basename) && !/-960all/i.test(basename)) category = 'all';
      else if (/^all-/i.test(basename)) category = 'other';
      else category = 'rootUnknown';
    } else {
      const sub = subpath.toLowerCase();
      // Check if in a skip dir inside product
      const inSkip = subpathParts.slice(0, -1).some(p => SKIP_DIRS.test(p));
      if (inSkip) continue;

      if (sub.startsWith('main/') && (sub.includes('/情境/') || sub.includes('/situation/'))) {
        category = 'situation';
      } else if (sub.startsWith('main/') && (sub.includes('/去背/') || sub.includes('/白背/') || sub.includes('/background/'))) {
        category = 'removeBackground';
      } else if (sub.startsWith('main/')) {
        if (/-600-main\./i.test(basename)) category = 'main600';
        else if (/-1000-main\./i.test(basename)) category = 'main1000';
        else category = 'mainUnknown';
      } else if (sub.startsWith('images-1000/')) {
        category = 'images1000';
      } else if (sub.startsWith('images/')) {
        category = 'images';
      } else {
        category = 'unknown';
      }
    }

    addFile(productKey, productName, category, file, basename);
  }

  return products;
}

// ─── Check rules ──────────────────────────────────────────────────
async function checkProduct(productData, onProgress) {
  const cats = productData.categories;
  const results = [];
  let total = 0;
  let done = 0;

  // Count all files to check
  const allCats = Object.values(cats);
  allCats.forEach(arr => total += arr.length);

  async function checkFiles(fileEntries, rules) {
    const checked = [];
    for (const { file, basename } of fileEntries) {
      const kb = bytesToKB(file.size);
      const dims = await getImageDimensions(file);
      done++;
      onProgress && onProgress(done / Math.max(total, 1));
      const errors = [];

      if (hasChinese(basename)) {
        errors.push(`檔名含有中文：「${basename}」`);
      }
      if (rules.exactW && dims.w !== rules.exactW) {
        errors.push(`寬度錯誤：${dims.w}px（應為 ${rules.exactW}px）`);
      }
      if (rules.exactH && dims.h !== rules.exactH) {
        errors.push(`高度錯誤：${dims.h}px（應為 ${rules.exactH}px）`);
      }
      if (rules.maxW && dims.w > rules.maxW) {
        errors.push(`寬度 ${dims.w}px 超出上限 ${rules.maxW}px`);
      }
      if (rules.exactW && dims.w !== 0 && dims.w !== rules.exactW && !rules.exactH) {
        // already covered
      }
      if (rules.maxH && dims.h > rules.maxH) {
        errors.push(`高度 ${dims.h}px 超出上限 ${rules.maxH}px（應為 ${rules.maxH}px 以內）`);
      }
      if (rules.minKB && kb < rules.minKB) {
        errors.push(`檔案過小：${fmt(kb)}（下限 ${rules.minKB} KB）`);
      }
      if (rules.maxKB && kb > rules.maxKB) {
        errors.push(`檔案過大：${fmt(kb)}（上限 ${fmtKB(rules.maxKB)}）`);
      }
      checked.push({ name: basename, size: file.size, kb, w: dims.w, h: dims.h, errors });
    }
    return checked;
  }

  function fmtKB(kb) { return kb >= 1024 ? (kb/1024).toFixed(0) + ' MB' : kb + ' KB'; }

  // ── 主圖 600 & 1000（數量須一致）────────────────────
  {
    const files600  = await checkFiles(cats.main600,  { exactW: 600,  exactH: 600,  minKB: 50, maxKB: 400 });
    const files1000 = await checkFiles(cats.main1000, { exactW: 1000, exactH: 1000, minKB: 50, maxKB: 400 });

    const genErrors600  = [];
    const genErrors1000 = [];

    if (files600.length === 0)  genErrors600.push('缺少主圖 600×600（品號-600-main）');
    if (files1000.length === 0) genErrors1000.push('缺少主圖 1000×1000（品號-1000-main）');

    // 數量一致性跨欄檢查（兩邊都有檔案才比）
    if (files600.length > 0 && files1000.length > 0 && files600.length !== files1000.length) {
      const msg = `主圖數量不一致：600×600 有 ${files600.length} 張，1000×1000 有 ${files1000.length} 張（兩者需相同）`;
      genErrors600.push(msg);
      genErrors1000.push(msg);
    }

    results.push({
      id: 'main600', label: '主圖 600×600', tag: 'required',
      files: files600, genErrors: genErrors600,
      spec: '尺寸 600×600px｜50～400 KB｜資料夾：main/｜檔名：品號-600-main｜需加 logo 隱藏浮水印',
      status: files600.length === 0 ? 'missing' : (genErrors600.length + files600.filter(f=>f.errors.length).length > 0 ? 'fail' : 'pass')
    });
    results.push({
      id: 'main1000', label: '主圖 1000×1000', tag: 'required',
      files: files1000, genErrors: genErrors1000,
      spec: '尺寸 1000×1000px｜50～400 KB｜資料夾：main/｜檔名：品號-1000-main｜需加 logo 隱藏浮水印｜床墊需含官網主圖及情境主圖',
      status: files1000.length === 0 ? 'missing' : (genErrors1000.length + files1000.filter(f=>f.errors.length).length > 0 ? 'fail' : 'pass')
    });
  }

  // ── 情境圖 ────────────────────────────────────────
  {
    const files = await checkFiles(cats.situation, { exactW: 1000, exactH: 1000, minKB: 50, maxKB: 400 });
    const genErrors = [];
    if (files.length === 0) genErrors.push('缺少情境圖（main/情境/ 資料夾）');
    results.push({
      id: 'situation', label: '情境圖', tag: 'required',
      spec: '尺寸 1000×1000px｜50～400 KB｜資料夾：main/情境/｜檔名：品號-a｜無壓標、無壓框',
      files, genErrors,
      status: files.length === 0 ? 'missing' : (genErrors.length + files.filter(f=>f.errors.length).length > 0 ? 'fail' : 'pass')
    });
  }

  // ── 去背 PNG/JPG ──────────────────────────────────
  {
    const rbFiles = cats.removeBackground;
    const genErrors = [];

    // Separate by size pattern
    const rb1000 = rbFiles.filter(f => /-1000\./i.test(f.basename) && !/-1000-main\./i.test(f.basename));
    const rb1500 = rbFiles.filter(f => /-1500\./i.test(f.basename));
    const rb1000png = rb1000.filter(f => /\.png$/i.test(f.basename));
    const rb1000jpg = rb1000.filter(f => /\.(jpe?g)$/i.test(f.basename));
    const rb1500png = rb1500.filter(f => /\.png$/i.test(f.basename));
    const rb1500jpg = rb1500.filter(f => /\.(jpe?g)$/i.test(f.basename));

    if (rbFiles.length === 0) genErrors.push('缺少去背／白背圖（main/去背/ 或 main/白背/ 資料夾）');
    else {
      if (rb1000png.length === 0) genErrors.push('缺少 品號-1000.png（去背／白背 1000×1000 PNG）');
      if (rb1000jpg.length === 0) genErrors.push('缺少 品號-1000.jpg（去背／白背 1000×1000 JPG）');
      if (rb1500png.length === 0) genErrors.push('缺少 品號-1500.png（去背／白背 1500×1500 PNG）');
      if (rb1500jpg.length === 0) genErrors.push('缺少 品號-1500.jpg（去背／白背 1500×1500 JPG）');
    }

    // Check 1000 files
    const files1000 = await checkFiles([...rb1000png, ...rb1000jpg], { exactW: 1000, exactH: 1000, minKB: 50, maxKB: 400 });
    const files1500 = await checkFiles([...rb1500png, ...rb1500jpg], { exactW: 1500, exactH: 1500, minKB: 50, maxKB: 400 });
    const files = [...files1000, ...files1500];

    results.push({
      id: 'removeBackground', label: '去背／白背 PNG/JPG', tag: 'required',
      spec: '尺寸 1000×1000 或 1500×1500px｜50～400 KB｜資料夾：main/去背/ 或 main/白背/｜PNG、JPG 各一｜無壓標、無壓框｜浮水印置入商品白背不要有',
      files, genErrors,
      status: (rbFiles.length === 0) ? 'missing' : (genErrors.length + files.filter(f=>f.errors.length).length > 0 ? 'fail' : 'pass')
    });
  }

  // ── 內文圖 images/ ────────────────────────────────
  {
    const files = await checkFiles(cats.images, { exactW: 1000, maxH: 1200, minKB: 200, maxKB: 400 });
    const genErrors = [];
    if (files.length === 0) genErrors.push('缺少內文圖（images/ 資料夾）');
    if (files.length > 12) genErrors.push(`數量超過限制：${files.length} 張（上限 12 張）`);
    const hasNonSquare = files.some(f => f.w !== 1000 || f.h !== 1000);
    results.push({
      id: 'images', label: `內文圖 (images/)`, tag: 'required',
      spec: '寬 1000px｜高 1200px 以內｜200～400 KB｜資料夾：images/｜檔名：品號_01～｜上限 12 張（含 TOP 圖、尺寸圖×1、偏運表×2）',
      files, genErrors, hasNonSquare,
      status: files.length === 0 ? 'missing' : (genErrors.length + files.filter(f=>f.errors.length).length > 0 ? 'fail' : 'pass')
    });
  }

  // ── 最外層 all ────────────────────────────────────
  {
    const files = await checkFiles(cats.all, { exactW: 1000, maxH: 9000, maxKB: 2048 });
    const genErrors = [];
    if (files.length === 0) genErrors.push('缺少最外層內文圖（品號-all_01）');
    results.push({
      id: 'all', label: '最外層內文圖 (all)', tag: 'required',
      spec: '寬 1000px｜高 9000px 以內｜2 MB 以內｜資料夾：最外層｜檔名：品號-all_01｜超過 9000px 切兩張（單張時可用品號-all）',
      files, genErrors,
      status: files.length === 0 ? 'missing' : (genErrors.length + files.filter(f=>f.errors.length).length > 0 ? 'fail' : 'pass')
    });
  }

  // ── 最外層 960all ─────────────────────────────────
  {
    const files = await checkFiles(cats.all960, { exactW: 960, maxH: 9000, maxKB: 2048 });
    const genErrors = [];
    if (files.length === 0) genErrors.push('缺少最外層內文圖（品號-960all_01）');
    results.push({
      id: 'all960', label: '最外層內文圖 (960all)', tag: 'required',
      spec: '寬 960px｜高 9000px 以內｜2 MB 以內｜資料夾：最外層｜檔名：品號-960all_01｜超過 9000px 切兩張（單張時可用品號-960all）',
      files, genErrors,
      status: files.length === 0 ? 'missing' : (genErrors.length + files.filter(f=>f.errors.length).length > 0 ? 'fail' : 'pass')
    });
  }

  // ── 正方形內文圖 images-1000/ ─────────────────────
  {
    const imagesResult = results.find(r => r.id === 'images');
    const imagesFiles = imagesResult ? imagesResult.files : [];
    // 非正方形 = 不是 1000×1000（images/ 允許高度到 1200，故 h 可能不是 1000）
    const hasNonSquare = imagesFiles.some(f => f.w !== 1000 || f.h !== 1000);
    const isRequired = hasNonSquare;
    const files = await checkFiles(cats.images1000, { exactW: 1000, exactH: 1000, maxKB: 2048 });

    const nonSquareFiles = imagesFiles.filter(f => f.w !== 1000 || f.h !== 1000);
    const nonSquareNames = nonSquareFiles
      .map(f => `${f.name}（${f.w || '?'}×${f.h || '?'}）`)
      .join('、');

    const genErrors = []; // 真正影響 status 的錯誤
    const genInfos  = []; // 參考用資訊，不影響 status

    if (isRequired && files.length === 0) {
      genErrors.push('images/ 含非 1000×1000 圖片，需補充正方形內文圖（images-1000/）');
      if (nonSquareNames) genErrors.push(`非正方形檔案：${nonSquareNames}`);
    }
    if (isRequired && files.length > 0 && nonSquareNames) {
      genInfos.push(`非正方形原圖（供參考）：${nonSquareNames}`);
    }
    if (files.length > 14) genErrors.push(`數量超過限制：${files.length} 張（上限 14 張）`);

    let status = 'skip';
    if (files.length > 0 || isRequired) {
      status = (genErrors.length + files.filter(f=>f.errors.length).length > 0) ? (isRequired ? 'fail' : 'warn') : 'pass';
    }
    if (isRequired && files.length === 0) status = 'fail';

    results.push({
      id: 'images1000', label: '正方形內文圖 (images-1000/) 蝦皮用', tag: isRequired ? 'conditional' : 'optional',
      spec: '尺寸 1000×1000px｜2 MB 以內｜資料夾：images-1000/｜檔名：品號_01～｜上限 14 張｜images/ 含非 1000×1000 圖時必要',
      files, genErrors, genInfos, isRequired, status
    });
  }

  // ── 其他 (all-用途)：不顯示，僅靜默歸類 ──────────
  // 不加入 results，略過顯示

  // ── 未知根目錄檔案 ────────────────────────────────
  if (cats.rootUnknown.length > 0) {
    const files = cats.rootUnknown.map(({ file, basename }) => ({
      name: basename, size: file.size, kb: bytesToKB(file.size), w: 0, h: 0,
      errors: ['無法辨識此檔案用途，請確認命名是否符合規範']
    }));
    results.push({
      id: 'rootUnknown', label: '無法辨識的根目錄檔案', tag: 'optional',
      files, genErrors: [],
      status: 'warn'
    });
  }

  return results;
}

// ─── Render ───────────────────────────────────────────────────────
function statusIcon(status) {
  return { pass: '✅', fail: '❌', missing: '❌', warn: '&#x26A0;&#xFE0F;', skip: '—' }[status] || '—';
}
function statusText(status) {
  return { pass: '通過', fail: '有問題', missing: '缺少', warn: '注意', skip: '略過' }[status] || '';
}
function statusClass(status) {
  return { pass: 'status-pass', fail: 'status-fail', missing: 'status-missing', warn: 'status-warn', skip: 'status-skip' }[status] || '';
}
function tagLabel(tag) {
  if (tag === 'required') return '<span class="cat-label-tag tag-required">必要</span>';
  if (tag === 'optional') return '<span class="cat-label-tag tag-optional">非必要</span>';
  if (tag === 'conditional') return '<span class="cat-label-tag tag-conditional">條件必要</span>';
  return '';
}
function badgeHtml(status) {
  const cls = { pass: 'badge-pass', fail: 'badge-fail', warn: 'badge-warn' }[status] || 'badge-warn';
  const txt = { pass: '全部通過', fail: '有問題', warn: '注意' }[status] || '有問題';
  return `<span class="badge ${cls}">${txt}</span>`;
}
function overallStatus(catResults) {
  if (catResults.some(r => r.status === 'fail' || r.status === 'missing')) return 'fail';
  if (catResults.some(r => r.status === 'warn')) return 'warn';
  return 'pass';
}

function renderProduct(productName, catResults, idx) {
  const overall = overallStatus(catResults);
  const card = document.createElement('div');
  card.className = 'product-card';
  if (idx === 0) card.classList.add('open');

  const header = document.createElement('div');
  header.className = 'product-header';
  header.innerHTML = `
    <span class="product-name" title="${productName}">${productName}</span>
    <div class="product-meta">
      ${badgeHtml(overall)}
      <span class="chevron">▶</span>
    </div>
  `;
  header.onclick = () => card.classList.toggle('open');

  const catList = document.createElement('div');
  catList.className = 'category-list';

  for (const cat of catResults) {
    const row = document.createElement('div');
    row.className = 'category-row';

    const hasFileErrors = cat.files && cat.files.some(f => f.errors && f.errors.length > 0);
    const hasGenErrors = cat.genErrors && cat.genErrors.length > 0;
    const hasAnyError = hasFileErrors || hasGenErrors;

    let fileListHtml = '';
    if (cat.files && cat.files.length > 0) {
      // Only show files that have errors, or if status is pass show all briefly
      const toShow = cat.status === 'pass'
        ? cat.files.slice(0, 3)
        : cat.files.filter(f => f.errors && f.errors.length > 0);

      if (toShow.length > 0) {
        fileListHtml = '<div class="file-list">' + toShow.map(f => {
          const meta = f.w ? `${f.w}×${f.h}px · ${fmt(f.kb)}` : fmtBytes(f.size);
          const errHtml = f.errors.length > 0
            ? '<div class="file-entry-errors">' + f.errors.map(e => `<div class="error-item">${e}</div>`).join('') + '</div>'
            : '';
          return `<div class="file-entry">
            <div class="file-entry-name">${f.name}</div>
            <div class="file-entry-meta">${meta}</div>
            ${errHtml}
          </div>`;
        }).join('') + '</div>';
      }
    }

    let bodyContent = '';
    if (cat.status === 'skip') {
      bodyContent = `<div class="pass-msg">—（此類別未偵測到檔案）</div>`;
    } else if (cat.status === 'pass') {
      const count = cat.files.length;
      const infoHtml = cat.genInfos && cat.genInfos.length > 0
        ? cat.genInfos.map(e => `<div class="info-item">${e}</div>`).join('')
        : '';
      bodyContent = `<div class="pass-msg">&#x2713; ${count} 個檔案，全部符合規範</div>${infoHtml ? `<div class="cat-errors">${infoHtml}</div>` : ''}`;
    } else {
      const genErrHtml = hasGenErrors
        ? cat.genErrors.map(e => `<div class="error-item">${e}</div>`).join('')
        : '';
      const genInfoHtml = cat.genInfos && cat.genInfos.length > 0
        ? cat.genInfos.map(e => `<div class="info-item">${e}</div>`).join('')
        : '';
      bodyContent = `<div class="cat-errors">${genErrHtml}${genInfoHtml}</div>${fileListHtml}`;
    }

    row.innerHTML = `
      <span class="cat-icon">${statusIcon(cat.status)}</span>
      <div class="cat-body">
        <div class="cat-title">${cat.label} ${tagLabel(cat.tag)}</div>
        ${cat.spec ? `<div class="cat-spec">${cat.spec}</div>` : ''}
        ${bodyContent}
      </div>
      <div class="cat-status ${statusClass(cat.status)}">${statusText(cat.status)}</div>
    `;
    catList.appendChild(row);
  }

  card.appendChild(header);
  card.appendChild(catList);
  return card;
}

// ─── Main flow ────────────────────────────────────────────────────
let running = false;

async function processFiles(files) {
  if (running) return;
  running = true;

  const dropZone = document.getElementById('dropZone');
  const progressArea = document.getElementById('progressArea');
  const summaryEl = document.getElementById('summary');
  const resultsEl = document.getElementById('results');

  dropZone.style.display = 'none';
  progressArea.style.display = 'block';
  summaryEl.style.display = 'none';
  resultsEl.innerHTML = '';

  setProgress(0, '解析資料夾結構…');

  const products = parseFiles(files);
  const productKeys = Object.keys(products);

  if (productKeys.length === 0) {
    progressArea.style.display = 'none';
    dropZone.style.display = 'block';
    alert('找不到有效的圖片檔案。請確認上傳的資料夾包含 main/、images/ 等子目錄，或圖片檔案。');
    running = false;
    return;
  }

  let totalPass = 0, totalFail = 0;
  const productResults = [];

  for (let i = 0; i < productKeys.length; i++) {
    const key = productKeys[i];
    const product = products[key];
    setProgress(i / productKeys.length, `檢查中（${i + 1}/${productKeys.length}）：${product.name}`);

    const catResults = await checkProduct(product, (pct) => {
      setProgress((i + pct) / productKeys.length, `檢查中（${i + 1}/${productKeys.length}）：${product.name}`);
    });

    const overall = overallStatus(catResults);
    if (overall === 'pass') totalPass++;
    else totalFail++;

    productResults.push({ name: product.name, catResults });
  }

  setProgress(1, '完成');
  await new Promise(r => setTimeout(r, 300));

  progressArea.style.display = 'none';
  summaryEl.style.display = 'flex';
  document.getElementById('totalCount').textContent = productKeys.length;
  document.getElementById('passCount').textContent = totalPass;
  document.getElementById('failCount').textContent = totalFail;

  for (let i = 0; i < productResults.length; i++) {
    const { name, catResults } = productResults[i];
    const card = renderProduct(name, catResults, i);
    resultsEl.appendChild(card);
  }

  running = false;
}

function setProgress(pct, label) {
  document.getElementById('progressBar').style.width = (pct * 100).toFixed(0) + '%';
  document.getElementById('progressPct').textContent = (pct * 100).toFixed(0) + '%';
  document.getElementById('progressText').textContent = label;
}

function resetApp() {
  document.getElementById('dropZone').style.display = 'block';
  document.getElementById('progressArea').style.display = 'none';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  document.getElementById('fileInput').value = '';
  running = false;
}

// ─── Event listeners ──────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', (e) => {
  if (e.target.files.length > 0) processFiles(e.target.files);
});

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', async (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const items = e.dataTransfer.items;
  if (!items || items.length === 0) return;

  const allFiles = [];
  const promises = [];

  for (const item of items) {
    const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
    if (entry && entry.isDirectory) {
      promises.push(readDirectoryEntry(entry, [entry.name]).then(files => allFiles.push(...files)));
    } else if (entry && entry.isFile) {
      promises.push(new Promise(r => entry.file(f => { allFiles.push(f); r(); })));
    }
  }

  await Promise.all(promises);
  if (allFiles.length > 0) processFiles(allFiles);
});

// Read directory recursively via DataTransferItem API
function readDirectoryEntry(dirEntry, pathParts) {
  return new Promise((resolve) => {
    const reader = dirEntry.createReader();
    const allFiles = [];
    const readBatch = () => {
      reader.readEntries(async (entries) => {
        if (entries.length === 0) { resolve(allFiles); return; }
        for (const entry of entries) {
          const entryPath = [...pathParts, entry.name];
          if (entry.isDirectory) {
            const subFiles = await readDirectoryEntry(entry, entryPath);
            allFiles.push(...subFiles);
          } else if (entry.isFile) {
            const file = await new Promise(r => entry.file(r));
            Object.defineProperty(file, 'webkitRelativePath', {
              value: entryPath.join('/'),
              configurable: true,
              writable: true
            });
            allFiles.push(file);
          }
        }
        readBatch();
      });
    };
    readBatch();
  });
}

// ─── Custom Spec Checker ──────────────────────────────────────────
let customRules = []; // [{ name, w, h, wMax, hMax, minKB, maxKB, raw }]

function parseSpecInput() {
  const text = document.getElementById('specInput').value.trim();
  if (!text) return;

  const rules = [];
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

  // ── 判斷是否為「橫向表格」格式 ──────────────────────────────
  // 橫向：第一欄是「尺寸」「數量」等屬性名稱，第一列是規格名稱
  // 特徵：有一行以 tab 分隔，第一個 cell 包含「尺寸」「size」「數量」等關鍵字
  const tabLines = lines.map(l => l.split('\t').map(c => c.trim()));
  const hasTabs = tabLines.some(cols => cols.length >= 3);

  if (hasTabs) {
    // 找出各屬性列
    let headerRow = null;   // 規格名稱列（含「投放位置」「名稱」或第一列）
    let dimRow = null;      // 尺寸列
    let countRow = null;    // 數量列
    let kbRow = null;       // KB 列

    for (const cols of tabLines) {
      const first = cols[0];
      if (/尺寸|size|像素|px|dimension/i.test(first)) { dimRow = cols; continue; }
      if (/數量|count|張數|quantity/i.test(first)) { countRow = cols; continue; }
      if (/kb|容量|大小|filesize/i.test(first)) { kbRow = cols; continue; }
      if (/投放|名稱|版本|規格|位置|類型|項目/i.test(first) || headerRow === null) {
        // 第一個非屬性列當作 header
        headerRow = cols;
      }
    }

    if (dimRow && headerRow) {
      // 從第 2 欄開始（col index 1+）每欄對應一個規格
      for (let i = 1; i < dimRow.length; i++) {
        const dimStr = dimRow[i];
        const dimMatch = dimStr.match(/(\d+)\s*[×xX\*]\s*(\d+)/);
        if (!dimMatch) continue;

        const w = parseInt(dimMatch[1]);
        const h = parseInt(dimMatch[2]);
        const name = (headerRow[i] || `規格${rules.length + 1}`).replace(/["'「」]/g, '').trim();
        const count = countRow ? (parseInt(countRow[i]) || null) : null;

        let minKB = null, maxKB = null;
        if (kbRow && kbRow[i]) {
          const kb = kbRow[i];
          const rangeKB = kb.match(/(\d+)\s*[~\-]\s*(\d+)/);
          const maxKB_ = kb.match(/(\d+(?:\.\d+)?)\s*[Kk][Bb]?\s*(?:以內|以下|<|≤)/);
          const mb = kb.match(/(\d+(?:\.\d+)?)\s*[Mm][Bb]/);
          if (rangeKB) { minKB = +rangeKB[1]; maxKB = +rangeKB[2]; }
          else if (maxKB_) { maxKB = +maxKB_[1]; }
          else if (mb) { maxKB = parseFloat(mb[1]) * 1024; }
        }

        rules.push({ name, w, h, minKB, maxKB, count, raw: `${name} ${dimStr}` });
      }
    }
  }

  // ── 一般逐行解析（橫向未解出結果，或非 tab 格式）──────────
  if (rules.length === 0) {
    for (const line of lines) {
      const cols = line.split(/\t|  +|｜|\|/).map(c => c.trim()).filter(Boolean);
      const fullLine = cols.join(' ');

      const dimMatch = fullLine.match(/(\d+)\s*[×xX\*]\s*(\d+)/);
      if (!dimMatch) continue;

      const w = parseInt(dimMatch[1]);
      const h = parseInt(dimMatch[2]);

      let minKB = null, maxKB = null;
      const rangeKB   = fullLine.match(/(\d+(?:\.\d+)?)\s*[~\-–]\s*(\d+(?:\.\d+)?)\s*[Kk][Bb]?/);
      const maxOnlyKB = fullLine.match(/(\d+(?:\.\d+)?)\s*[Kk][Bb]?\s*(?:以內|以下|內|max|MAX|&#x2193;|≤|<=|<)/);
      const minOnlyKB = fullLine.match(/(\d+(?:\.\d+)?)\s*[Kk][Bb]?\s*(?:以上|above|&#x2191;|≥|>=|>)/);
      const mbMax     = fullLine.match(/(\d+(?:\.\d+)?)\s*[Mm][Bb]\s*(?:以內|以下|內|max|MAX|&#x2193;|≤|<=|<)?/);
      const plainKB   = fullLine.match(/(\d+(?:\.\d+)?)\s*[Kk][Bb]?/);

      if (rangeKB) { minKB = parseFloat(rangeKB[1]); maxKB = parseFloat(rangeKB[2]); }
      else if (maxOnlyKB) { maxKB = parseFloat(maxOnlyKB[1]); }
      else if (minOnlyKB) { minKB = parseFloat(minOnlyKB[1]); }
      else if (mbMax)     { maxKB = parseFloat(mbMax[1]) * 1024; }
      else if (plainKB)   { maxKB = parseFloat(plainKB[1]); }

      let name = '';
      if (cols.length >= 2) {
        const firstCol = cols[0];
        if (!/^\d/.test(firstCol) && !/[×xX\*]/.test(firstCol)) name = firstCol;
      }
      if (!name) {
        const cnMatch = fullLine.match(/[\u4e00-\u9fff\u3400-\u4dbf][\u4e00-\u9fff\u3400-\u4dbf\w\s（）()－\-]*/);
        name = cnMatch ? cnMatch[0].trim().slice(0,20) : `規格${rules.length + 1}`;
      }

      const lineWithoutDim = fullLine.replace(/\d+\s*[×xX\*]\s*\d+(\s*px)?/g, '');
      let count = null;
      const countMatch = lineWithoutDim.match(/[xX×]\s*(\d+)|(\d+)\s*張/);
      if (countMatch) count = parseInt(countMatch[1] || countMatch[2]);

      rules.push({ name, w, h, minKB, maxKB, count, raw: line });
    }
  }

  customRules = rules;
  renderParsedRules();
  rerunCustomCheck();
}

function renderParsedRules() {
  const container = document.getElementById('parsedRules');
  const hint = document.getElementById('ruleHint');
  if (customRules.length === 0) {
    container.innerHTML = '';
    hint.style.display = 'none';
    return;
  }
  hint.style.display = 'block';
  container.innerHTML = customRules.map((r, i) => {
    const kbText = r.minKB && r.maxKB ? `${r.minKB}～${r.maxKB} KB`
      : r.maxKB ? `≤ ${r.maxKB < 1024 ? r.maxKB + ' KB' : (r.maxKB/1024).toFixed(1) + ' MB'}`
      : r.minKB ? `≥ ${r.minKB} KB` : '不限 KB';
    const countText = r.count ? `　${r.count} 張` : '';
    return `<div class="rule-chip">
      <span class="rule-chip-name">${r.name}</span>
      <span class="rule-chip-spec">${r.w}×${r.h}px　${kbText}${countText}</span>
      <span class="rule-chip-del" onclick="deleteRule(${i})" title="刪除">&#x2715;</span>
    </div>`;
  }).join('');
  document.getElementById('customDropZone').classList.toggle('has-rules', customRules.length > 0);
}

function deleteRule(i) {
  customRules.splice(i, 1);
  renderParsedRules();
  rerunCustomCheck();
}

// ─── Custom file check ────────────────────────────────────────────
let customFileCache = [];   // 已檢核結果
let pendingFiles = [];      // 待檢核佇列 { file, sizeText }

function addToPending(files) {
  const IMAGE_RE = /\.(jpe?g|png|gif|webp|bmp)$/i;
  const newFiles = Array.from(files).filter(f => IMAGE_RE.test(f.name));
  newFiles.forEach(f => {
    // 避免重複加入（同名同大小）
    const dup = pendingFiles.find(p => p.file.name === f.name && p.file.size === f.size);
    if (!dup) pendingFiles.push({ file: f, sizeText: (f.size/1000).toFixed(1) + ' KB' });
  });
  renderPending();
}

function renderPending() {
  const area = document.getElementById('pendingArea');
  const list = document.getElementById('pendingList');
  const countEl = document.getElementById('pendingCount');
  if (pendingFiles.length === 0) { area.style.display = 'none'; return; }
  area.style.display = 'block';
  countEl.textContent = `${pendingFiles.length} 張待檢核`;
  list.innerHTML = pendingFiles.map((p, i) => `
    <div class="pending-item">
      <span class="pending-item-name">${p.file.name}</span>
      <span class="pending-item-size">${p.sizeText}</span>
      <span class="pending-item-del" onclick="removePending(${i})">&#x2715;</span>
    </div>`).join('');
}

function removePending(i) {
  pendingFiles.splice(i, 1);
  renderPending();
}

function clearPending() {
  pendingFiles = [];
  renderPending();
  document.getElementById('customResults').innerHTML = '';
}

async function confirmCheck() {
  const container = document.getElementById('customResults');

  if (pendingFiles.length === 0) {
    container.innerHTML = `<div class="rule-hint" style="margin-top:12px;display:block;color:#DC2626">&#x26A0;&#xFE0F; 尚未加入任何圖片，請先拖入或選擇圖片。</div>`;
    return;
  }
  if (customRules.length === 0) {
    container.innerHTML = `<div class="rule-hint" style="margin-top:12px;display:block;color:#DC2626">&#x26A0;&#xFE0F; 尚未解析規格，請在左側貼上規格文字並按「解析規格」。</div>`;
    return;
  }

  const btn = document.querySelector('.pending-confirm-btn');
  btn.textContent = '檢核中…';
  btn.disabled = true;

  container.innerHTML = `<div class="rule-hint" style="margin-top:12px;display:block">讀取圖片中（${pendingFiles.length} 張）…</div>`;

  const entries = [];
  for (let i = 0; i < pendingFiles.length; i++) {
    const { file } = pendingFiles[i];
    const dims = await getImageDimensions(file);
    const kb = bytesToKB(file.size);
    entries.push({ file, w: dims.w, h: dims.h, kb });
    if (i % 3 === 0) {
      container.innerHTML = `<div class="rule-hint" style="margin-top:12px;display:block">讀取中 ${i+1} / ${pendingFiles.length}…</div>`;
      await new Promise(r => setTimeout(r, 0)); // 讓 UI 有機會更新
    }
  }
  customFileCache = entries;
  renderCustomResults(entries);

  // 檢核完成後隱藏待檢核清單
  document.getElementById('pendingArea').style.display = 'none';

  btn.textContent = '確認檢核 &#x2192;';
  btn.disabled = false;
}

async function runCustomCheck(files) {
  addToPending(files);
}

function rerunCustomCheck() {
  if (customFileCache.length > 0) renderCustomResults(customFileCache);
}

function matchRule(entry) {
  // Try to find a matching rule by filename keyword first
  const lname = entry.file.name.toLowerCase();
  let matched = customRules.find(r => lname.includes(r.name.toLowerCase()) && r.name.length >= 2);
  // If no keyword match, find any rule where dimensions match
  if (!matched) matched = customRules.find(r => r.w === entry.w && r.h === entry.h);
  // If still no match, apply all rules and pick best match (smallest combined dim error)
  if (!matched && customRules.length === 1) matched = customRules[0];
  return matched || null;
}

function checkAgainstRule(entry, rule) {
  const errors = [];

  // 尺寸檢查
  if (entry.w !== rule.w || entry.h !== rule.h) {
    errors.push(`尺寸錯誤：實際 ${entry.w}×${entry.h}px，規格須為 ${rule.w}×${rule.h}px`);
  }

  // KB 檢查
  if (rule.minKB !== null && entry.kb < rule.minKB) {
    errors.push(`檔案過小：${entry.kb.toFixed(1)} KB（下限 ${rule.minKB} KB）`);
  }
  if (rule.maxKB !== null && entry.kb > rule.maxKB) {
    errors.push(`檔案過大：${entry.kb.toFixed(1)} KB（上限 ${rule.maxKB < 1024 ? rule.maxKB + ' KB' : (rule.maxKB/1024).toFixed(1) + ' MB'}）`);
  }

  // 檔名尺寸檢查：需包含 WxH / W×H / W_H（不分大小寫，可加px後綴）
  const w = rule.w, h = rule.h;
  const namePatterns = [
    `${w}x${h}`, `${w}X${h}`, `${w}_${h}`,
    `${w}x${h}px`, `${w}X${h}px`, `${w}_${h}px`
  ];
  const fname = entry.file.name;
  const hasSize = namePatterns.some(p => fname.toLowerCase().includes(p.toLowerCase()));
  if (!hasSize) {
    errors.push(`檔名未包含尺寸標示，需包含以下其一：${namePatterns.slice(0,3).join(' / ')}（可加 px 後綴）`);
  }

  return errors;
}

function renderCustomResults(entries) {
  const container = document.getElementById('customResults');
  if (entries.length === 0) { container.innerHTML = ''; return; }
  if (customRules.length === 0) {
    container.innerHTML = `<div class="rule-hint" style="margin-top:12px;display:block">請先在左側貼上規格並解析。</div>`;
    return;
  }

  // 每條規則的檔案歸組（用於張數統計）
  const ruleGroups = {};
  customRules.forEach((r, i) => ruleGroups[i] = []);

  let passCount = 0, failCount = 0, nomatchCount = 0;
  const rows = entries.map(entry => {
    const rule = matchRule(entry);
    if (!rule) {
      nomatchCount++;
      return `<div class="custom-file-row row-nomatch">
        <div class="custom-file-info">
          <div class="custom-file-name">${entry.file.name}</div>
          <div class="custom-file-meta">${entry.w}×${entry.h}px　${entry.kb.toFixed(1)} KB</div>
          <div style="font-size:12px;color:#93C5FD;margin-top:4px">— 無對應規格（尺寸不符任何規則）</div>
        </div>
        <span class="custom-badge cb-nomatch">無對應</span>
      </div>`;
    }

    // 歸組
    const ruleIdx = customRules.indexOf(rule);
    if (ruleIdx >= 0) ruleGroups[ruleIdx].push(entry);

    const errors = checkAgainstRule(entry, rule);

    // 張數不足警告（標在每個通過的項目上）
    const actualCount = ruleIdx >= 0 ? ruleGroups[ruleIdx].length : 0;
    const countShortage = rule.count && actualCount < rule.count;

    if (errors.length === 0 && !countShortage) passCount++;
    else if (errors.length === 0 && countShortage) passCount++; // 仍算通過，但加警告
    else failCount++;

    const kbText = rule.minKB && rule.maxKB ? `${rule.minKB}～${rule.maxKB} KB`
      : rule.maxKB ? `≤ ${rule.maxKB < 1024 ? rule.maxKB + ' KB' : (rule.maxKB/1024).toFixed(1) + ' MB'}`
      : rule.minKB ? `≥ ${rule.minKB} KB` : '';
    const ruleSpec = `${rule.w}×${rule.h}px${kbText ? '　' + kbText : ''}${rule.count ? `　${rule.count} 張` : ''}`;

    // 錯誤放大顯示
    const errHtml = errors.map(e => `
      <div class="custom-error-item">
        <span class="custom-error-icon">&#x2715;</span>
        <span class="custom-error-text">${e}</span>
      </div>`).join('');

    // 張數不足提示（貼在通過項目上）
    const countBannerHtml = countShortage ? `
      <div class="count-inline-warning">
        &#x26A0;&#xFE0F; 規格「${rule.name}」需要 <strong>${rule.count}</strong> 張，目前僅 <strong>${actualCount}</strong> 張，還差 <strong>${rule.count - actualCount}</strong> 張
      </div>` : '';

    return `<div class="custom-file-row ${errors.length === 0 ? (countShortage ? 'row-count-warn' : 'row-pass') : 'row-fail'}">
      <div class="custom-file-info">
        <div class="custom-file-name ${errors.length > 0 ? 'name-fail' : ''}">${entry.file.name}</div>
        <div class="custom-file-meta">${entry.w}×${entry.h}px　${entry.kb.toFixed(1)} KB</div>
        <div class="custom-rule-match">對應規格：${rule.name}（${ruleSpec}）</div>
        ${countBannerHtml}
        ${errHtml ? `<div class="custom-errors-wrap">${errHtml}</div>` : ''}
      </div>
      <span class="custom-badge ${errors.length === 0 ? (countShortage ? 'cb-count-warn' : 'cb-pass') : 'cb-fail'}">${errors.length === 0 ? (countShortage ? '&#x26A0;&#xFE0F; 張數不足' : '&#x2713; 通過') : `&#x2715; ${errors.length} 項問題`}</span>
    </div>`;
  });

  // 張數警告（每條規則）
  const countWarnings = customRules.map((r, i) => {
    if (!r.count) return '';
    const actual = ruleGroups[i].length;
    if (actual !== r.count) {
      return `<div class="count-warning">
        &#x26A0;&#xFE0F; 規格「${r.name}」需要 ${r.count} 張，實際上傳 <strong>${actual}</strong> 張
      </div>`;
    }
    return '';
  }).filter(Boolean).join('');

  const total = entries.length;
  container.innerHTML = `
    <div class="custom-summary-bar">
      <span class="stat"><span class="stat-num" style="font-size:18px;color:#2563EB">${total}</span>&nbsp;張</span>
      <span class="stat"><span class="stat-num green" style="font-size:18px">${passCount}</span>&nbsp;通過</span>
      <span class="stat"><span class="stat-num red" style="font-size:18px">${failCount}</span>&nbsp;有問題</span>
      ${nomatchCount > 0 ? `<span class="stat"><span class="stat-num" style="font-size:18px;color:#93C5FD">${nomatchCount}</span>&nbsp;無對應</span>` : ''}
      <button class="custom-clear-btn" onclick="clearCustom()">清除</button>
    </div>
    ${countWarnings}
    ${rows.join('')}
  `;
}

function clearCustom() {
  customFileCache = [];
  pendingFiles = [];
  renderPending();
  document.getElementById('customResults').innerHTML = '';
}

// ─── Custom drop zone events ──────────────────────────────────────
const customDZ = document.getElementById('customDropZone');
const customFI = document.getElementById('customFileInput');

customFI.addEventListener('change', () => {
  if (customFI.files.length > 0) runCustomCheck(Array.from(customFI.files));
});
customDZ.addEventListener('dragover', e => { e.preventDefault(); customDZ.classList.add('drag-over'); });
customDZ.addEventListener('dragleave', () => customDZ.classList.remove('drag-over'));
customDZ.addEventListener('drop', async e => {
  e.preventDefault();
  customDZ.classList.remove('drag-over');
  const files = [];
  const IMAGE_RE = /\.(jpe?g|png|gif|webp|bmp)$/i;
  const items = e.dataTransfer.items;
  if (items) {
    const promises = [];
    for (const item of items) {
      const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
      if (entry && entry.isDirectory) {
        promises.push(readDirectoryEntry(entry, [entry.name]).then(fs => files.push(...fs.filter(f => IMAGE_RE.test(f.name)))));
      } else if (item.kind === 'file') {
        const f = item.getAsFile();
        if (f && IMAGE_RE.test(f.name)) files.push(f);
      }
    }
    await Promise.all(promises);
  } else {
    Array.from(e.dataTransfer.files).filter(f => IMAGE_RE.test(f.name)).forEach(f => files.push(f));
  }
  if (files.length > 0) runCustomCheck(files);
});

</script>
